# \u5E94\u7528\u540D\u79F0
spring.application.name=unknownharddrivesystem

# Web\u670D\u52A1\u5668\u914D\u7F6E
server.port=11451

# MyBatis Mapper\u6587\u4EF6\u4F4D\u7F6E
mybatis.mapper-locations=classpath:mapper/*.xml

# MyBatis\u5B9E\u4F53\u7C7B\u626B\u63CF\u5305\u8DEF\u5F84
mybatis.type-aliases-package=com.unknownharddrivesystem.entity

# \u5F00\u542FMyBatis SQL\u65E5\u5FD7\u8F93\u51FA
#mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# \u5F00\u542FMyBatis\u4E0B\u5212\u7EBF\u547D\u540D\u5230\u9A7C\u5CF0\u547D\u540D\u7684\u81EA\u52A8\u8F6C\u6362
mybatis.configuration.map-underscore-to-camel-case=true

# MySQL\u6570\u636E\u5E93\u914D\u7F6E
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/unknown_hard_drive_system
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# \u63D0\u4EA4\u5931\u8D25\u65F6\u56DE\u6EDA
spring.transaction.rollback-on-commit-failure=true

# \u6587\u4EF6\u4E0A\u4F20\u5927\u5C0F\u9650\u5236\u914D\u7F6E
spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=1024MB

#\u8BBE\u7F6Esession\u8FC7\u671F\u65F6\u95F4
server.servlet.session.timeout=60m

#redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
